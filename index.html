<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO.JS - Tworzymy Twoją Przyszłość w Sieci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'matte-black': '#121212',
                        'silver-light': '#D1D5DB',
                        'silver-dark': '#4B5563',
                    }
                }
            }
        }
    </script>
    <style>
        html, body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }

        .silver-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #menu-btn.active div:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        #menu-btn.active div:nth-child(2) { opacity: 0; }
        #menu-btn.active div:nth-child(3) { width: 2rem; transform: translateY(-8px) rotate(-45deg); }
        #menu-btn div { transition: transform 0.3s ease, opacity 0.3s ease, width 0.3s ease; }

        #gallery-wrap { cursor: grab; user-select: none; }
        #gallery-wrap:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-matte-black text-white font-sans">

    <nav class="fixed top-0 left-0 w-full z-[100] p-6 flex justify-between items-center bg-transparent">
        <div class="text-white font-bold tracking-tighter text-2xl cursor-pointer" onclick="navigate('home')">STUDIO.JS</div>
        <div class="hidden md:flex items-center gap-8">
            <a href="#" onclick="event.preventDefault();navigate('home')"      class="text-sm uppercase tracking-widest hover:text-silver-light transition">Start</a>
            <a href="#" onclick="event.preventDefault();navigate('portfolio')" class="text-sm uppercase tracking-widest hover:text-silver-light transition">Portfolio</a>
            <a href="#" onclick="event.preventDefault();navigate('oferta')"    class="text-sm uppercase tracking-widest hover:text-silver-light transition">Oferta</a>
            <a href="#" onclick="event.preventDefault();navigate('kontakt')"   class="text-sm uppercase tracking-widest hover:text-silver-light transition">Kontakt</a>
            <button onclick="navigate('wycena')" class="border border-white/20 px-4 py-2 text-sm hover:bg-white hover:text-black transition">Wycena</button>
        </div>
        <button id="menu-btn" class="md:hidden flex flex-col gap-1.5 focus:outline-none">
            <div class="w-8 h-0.5 bg-white"></div>
            <div class="w-8 h-0.5 bg-white"></div>
            <div class="w-5 h-0.5 bg-white"></div>
        </button>
    </nav>

    <div id="menu-overlay" class="fixed inset-0 bg-matte-black z-[90] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <ul class="text-center space-y-8">
            <li><a href="#" onclick="closeMenu('home');return false;"      class="text-5xl font-light text-white hover:text-silver-light transition">Start</a></li>
            <li><a href="#" onclick="closeMenu('portfolio');return false;" class="text-5xl font-light text-white hover:text-silver-light transition">Portfolio</a></li>
            <li><a href="#" onclick="closeMenu('oferta');return false;"    class="text-5xl font-light text-white hover:text-silver-light transition">Oferta</a></li>
            <li><a href="#" onclick="closeMenu('kontakt');return false;"   class="text-5xl font-light text-white hover:text-silver-light transition">Kontakt</a></li>
            <li><a href="#" onclick="closeMenu('wycena');return false;"    class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-silver-light to-white">Wycena</a></li>
        </ul>
    </div>

    <main id="main" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding-top:80px;padding-bottom:48px;opacity:0;transition:opacity 0.4s ease;"></main>

    <footer class="fixed bottom-0 left-0 w-full z-80 p-4 text-xs text-gray-600 flex justify-between items-center">
        <div>&copy; 2025 STUDIO.JS. Wszelkie prawa zastrzeżone.</div>
        <div class="hidden md:block">Strona stworzona z pasją.</div>
    </footer>

<script>
// ─── Treści sekcji ────────────────────────────────────────────────────────────
const sectionsContent = {
    home: `
        <section style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;">
            <div style="text-align:center;padding:2vh 24px 1.5vh;flex-shrink:0;">
                <h1 class="text-6xl md:text-8xl font-extrabold leading-tight text-white mb-4">
                    Kodujemy <br><span class="text-silver-light">przyszłość.</span>
                </h1>
                <p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-6">
                    Zmieniamy wizje w interaktywne doświadczenia. Tworzymy strony, które nie tylko wyglądają, ale działają.
                </p>
                <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
                    <button onclick="navigate('portfolio')" class="bg-silver-light text-matte-black px-8 py-3 text-lg font-semibold rounded-full hover:bg-white transition duration-300">Zobacz Portfolio</button>
                    <button onclick="navigate('wycena')" class="border border-silver-dark text-silver-light px-8 py-3 text-lg font-semibold rounded-full hover:bg-silver-dark hover:text-white transition duration-300">Darmowa Wycena</button>
                </div>
            </div>
            <div id="gallery-wrap" style="flex:1;min-height:0;overflow:hidden;position:relative;">
                <canvas id="gallery-canvas" style="display:block;width:100%;height:100%;"></canvas>
            </div>
        </section>
    `,
    portfolio: `
        <section class="h-full w-full flex flex-col justify-center items-center p-6 md:p-20 text-center">
            <h2 class="text-5xl md:text-6xl font-bold text-silver-light mb-8">Nasze Realizacje</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl">
                <div class="silver-card p-6 rounded-lg shadow-xl text-left">
                    <h3 class="text-2xl font-semibold mb-2 text-white">Projekt Echo</h3>
                    <p class="text-gray-400 text-sm mb-4">Strona korporacyjna / Next.js / Tailwind CSS</p>
                    <p class="text-silver-light leading-relaxed">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                </div>
                <div class="silver-card p-6 rounded-lg shadow-xl text-left">
                    <h3 class="text-2xl font-semibold mb-2 text-white">E-commerce Quantum</h3>
                    <p class="text-gray-400 text-sm mb-4">Sklep internetowy / React / Sanity CMS</p>
                    <p class="text-silver-light leading-relaxed">Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
                </div>
                <div class="silver-card p-6 rounded-lg shadow-xl text-left">
                    <h3 class="text-2xl font-semibold mb-2 text-white">Aplikacja Flow</h3>
                    <p class="text-gray-400 text-sm mb-4">Web App / Vue.js / Firebase</p>
                    <p class="text-silver-light leading-relaxed">Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.</p>
                </div>
            </div>
        </section>
    `,
    oferta: `
        <section class="h-full w-full flex flex-col justify-center items-center p-6 md:p-20 text-center">
            <h2 class="text-5xl md:text-6xl font-bold text-silver-light mb-8">Co Oferujemy</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl">
                <div class="p-6 rounded-lg silver-card shadow-xl">
                    <h3 class="text-3xl font-semibold mb-3 text-white">Strony Wizytówki</h3>
                    <p class="text-gray-400">Nowoczesny design, responsywność i optymalizacja SEO dla Twojej obecności online.</p>
                </div>
                <div class="p-6 rounded-lg silver-card shadow-xl">
                    <h3 class="text-3xl font-semibold mb-3 text-white">Sklepy E-commerce</h3>
                    <p class="text-gray-400">Efektywne platformy sprzedażowe z intuicyjnym UX i bezpiecznymi płatnościami.</p>
                </div>
                <div class="p-6 rounded-lg silver-card shadow-xl">
                    <h3 class="text-3xl font-semibold mb-3 text-white">Aplikacje Webowe</h3>
                    <p class="text-gray-400">Szyte na miarę rozwiązania, automatyzujące procesy i wspierające rozwój biznesu.</p>
                </div>
            </div>
        </section>
    `,
    kontakt: `
        <section class="h-full w-full flex flex-col justify-center items-center p-6 md:p-20 text-center">
            <h2 class="text-5xl md:text-6xl font-bold text-silver-light mb-8">Skontaktuj Się</h2>
            <div class="silver-card p-8 rounded-lg shadow-xl max-w-xl w-full">
                <p class="text-lg text-white mb-6">Chętnie odpowiemy na Twoje pytania.</p>
                <div class="space-y-4">
                    <input type="text"  placeholder="Imię i Nazwisko" class="w-full p-3 bg-matte-black border border-silver-dark rounded-md text-white placeholder-gray-500 focus:outline-none focus:border-silver-light"/>
                    <input type="email" placeholder="Adres E-mail"    class="w-full p-3 bg-matte-black border border-silver-dark rounded-md text-white placeholder-gray-500 focus:outline-none focus:border-silver-light"/>
                    <textarea placeholder="Twoja Wiadomość" rows="5"  class="w-full p-3 bg-matte-black border border-silver-dark rounded-md text-white placeholder-gray-500 focus:outline-none focus:border-silver-light"></textarea>
                    <button class="bg-silver-light text-matte-black px-6 py-3 font-semibold rounded-md hover:bg-white transition duration-300">Wyślij Wiadomość</button>
                </div>
            </div>
        </section>
    `,
    wycena: `
        <section class="h-full w-full flex flex-col justify-center items-center p-6 md:p-20 text-center">
            <h2 class="text-5xl md:text-6xl font-bold text-silver-light mb-8">Darmowa Wycena Projektu</h2>
            <div class="silver-card p-8 rounded-lg shadow-xl max-w-2xl w-full">
                <p class="text-lg text-white mb-6">Opowiedz nam o swoim projekcie, a my przygotujemy spersonalizowaną ofertę.</p>
                <div class="space-y-4">
                    <select class="w-full p-3 bg-matte-black border border-silver-dark rounded-md text-white focus:outline-none focus:border-silver-light">
                        <option value="">Jaki typ strony Cię interesuje?</option>
                        <option value="wizytowka">Strona Wizytówka</option>
                        <option value="ecommerce">Sklep E-commerce</option>
                        <option value="aplikacja">Aplikacja Webowa</option>
                        <option value="inne">Inne / Konsultacja</option>
                    </select>
                    <input type="text" placeholder="Budżet (opcjonalnie)" class="w-full p-3 bg-matte-black border border-silver-dark rounded-md text-white placeholder-gray-500 focus:outline-none focus:border-silver-light"/>
                    <textarea placeholder="Opisz swój projekt..." rows="7" class="w-full p-3 bg-matte-black border border-silver-dark rounded-md text-white placeholder-gray-500 focus:outline-none focus:border-silver-light"></textarea>
                    <button class="bg-silver-light text-matte-black px-6 py-3 font-semibold rounded-md hover:bg-white transition duration-300">Wyślij Zapytanie</button>
                </div>
            </div>
        </section>
    `,
};

// ─── Nawigacja ────────────────────────────────────────────────────────────────
const main = document.getElementById('main');
const menuBtn = document.getElementById('menu-btn');
const menuOverlay = document.getElementById('menu-overlay');
let currentPage = null;
let galleryInstance = null;

function setHomeStyles() {
    document.body.style.overflow = 'hidden';
    main.style.height = '100vh';
    main.style.minHeight = '100vh';
    main.style.alignItems = 'stretch';
    main.style.justifyContent = 'flex-start';
    main.style.padding = '0';
}
function setPageStyles() {
    document.body.style.overflow = '';
    main.style.height = '';
    main.style.minHeight = '100vh';
    main.style.alignItems = 'center';
    main.style.justifyContent = 'center';
    main.style.padding = '80px 0 48px';
}

function navigate(page) {
    if (currentPage === page) return;
    currentPage = page;
    history.pushState({ page }, '', '#' + page);
    main.style.opacity = '0';
    setTimeout(() => {
        if (galleryInstance) { galleryInstance.destroy(); galleryInstance = null; }
        main.innerHTML = sectionsContent[page] || sectionsContent['home'];
        window.scrollTo(0, 0);
        if (page === 'home') {
            setHomeStyles();
            requestAnimationFrame(() => { galleryInstance = initGallery(); });
        } else {
            setPageStyles();
        }
        main.style.opacity = '1';
    }, 400);
}

menuBtn.addEventListener('click', () => {
    menuOverlay.classList.toggle('opacity-0');
    menuOverlay.classList.toggle('pointer-events-none');
    menuBtn.classList.toggle('active');
});
function closeMenu(page) {
    menuOverlay.classList.add('opacity-0', 'pointer-events-none');
    menuBtn.classList.remove('active');
    navigate(page);
}
window.addEventListener('popstate', (e) => {
    currentPage = null;
    navigate(e.state?.page || 'home');
});

// Inicjalizacja
const init = window.location.hash.substring(1) || 'home';
main.innerHTML = sectionsContent[init] || sectionsContent['home'];
currentPage = init;
history.replaceState({ page: init }, '', '#' + init);
if (init === 'home') {
    setHomeStyles();
    requestAnimationFrame(() => { galleryInstance = initGallery(); });
} else {
    setPageStyles();
}
setTimeout(() => { main.style.opacity = '1'; }, 50);

// ─── Galeria Canvas ───────────────────────────────────────────────────────────
const GALLERY_ITEMS = [
    { src: 'https://picsum.photos/seed/11/800/500?grayscale', label: 'Projekt Echo' },
    { src: 'https://picsum.photos/seed/22/800/500?grayscale', label: 'E-commerce Quantum' },
    { src: 'https://picsum.photos/seed/33/800/500?grayscale', label: 'Aplikacja Flow' },
    { src: 'https://picsum.photos/seed/44/800/500?grayscale', label: 'Portal Nova' },
    { src: 'https://picsum.photos/seed/55/800/500?grayscale', label: 'Dashboard X' },
    { src: 'https://picsum.photos/seed/66/800/500?grayscale', label: 'Studio Alpha' },
];

function initGallery() {
    const wrap = document.getElementById('gallery-wrap');
    const canvas = document.getElementById('gallery-canvas');
    if (!wrap || !canvas) return null;

    const ctx = canvas.getContext('2d');
    const RADIUS = 14;
    const GAP = 20;
    const LABEL_H = 40;

    // Załaduj obrazki
    const items = GALLERY_ITEMS.map(item => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = item.src;
        return { img, label: item.label };
    });

    // Scroll
    let scrollX = 0;
    let targetX = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartScroll = 0;
    let raf = null;

    function resize() {
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight;
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function draw() {
        // Bezwładność
        scrollX += (targetX - scrollX) * 0.1;

        const W = canvas.width;
        const H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        const cardH = H - LABEL_H - 12;
        const cardW = Math.min(cardH * 1.55, W * 0.72);
        const totalW = items.length * (cardW + GAP) - GAP;
        const maxScroll = Math.max(0, totalW - W + GAP * 2);

        // Ogranicz z lekką elastycznością
        if (!isDragging) targetX = Math.max(0, Math.min(targetX, maxScroll));

        items.forEach((item, i) => {
            const x = GAP - scrollX + i * (cardW + GAP);
            const y = 6;

            if (x + cardW < -20 || x > W + 20) return;

            // Clip do zaokrąglonego prostokąta
            ctx.save();
            roundRect(x, y, cardW, cardH, RADIUS);
            ctx.clip();

            if (item.img.complete && item.img.naturalWidth) {
                const scale = Math.max(cardW / item.img.naturalWidth, cardH / item.img.naturalHeight);
                const sw = item.img.naturalWidth * scale;
                const sh = item.img.naturalHeight * scale;
                ctx.drawImage(item.img, x + (cardW - sw) / 2, y + (cardH - sh) / 2, sw, sh);
            } else {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x, y, cardW, cardH);
            }

            // Gradient overlay
            const grad = ctx.createLinearGradient(0, y + cardH * 0.4, 0, y + cardH);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, cardW, cardH);

            ctx.restore();

            // Border
            ctx.save();
            roundRect(x, y, cardW, cardH, RADIUS);
            ctx.strokeStyle = 'rgba(255,255,255,0.07)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            // Label
            ctx.fillStyle = 'rgba(209,213,219,0.75)';
            ctx.font = '12px system-ui, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(item.label, x + 4, y + cardH + 26);
        });

        raf = requestAnimationFrame(draw);
    }

    function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

    function onDown(e) {
        isDragging = true;
        dragStartX = getX(e);
        dragStartScroll = targetX;
    }
    function onMove(e) {
        if (!isDragging) return;
        targetX = dragStartScroll + (dragStartX - getX(e));
    }
    function onUp() { isDragging = false; }

    canvas.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    canvas.addEventListener('touchstart', onDown, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('touchend', onUp);

    const onResize = () => resize();
    window.addEventListener('resize', onResize);

    resize();
    draw();

    return {
        destroy() {
            cancelAnimationFrame(raf);
            canvas.removeEventListener('mousedown', onDown);
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            canvas.removeEventListener('touchstart', onDown);
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onUp);
            window.removeEventListener('resize', onResize);
        }
    };
}
</script>
</body>
</html>
